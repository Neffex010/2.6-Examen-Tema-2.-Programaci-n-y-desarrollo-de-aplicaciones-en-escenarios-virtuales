<!DOCTYPE html>
<html lang="es">
<head>
    <title>Ring Box - Three.js</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <link type="text/css" rel="stylesheet" href="./main.css">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥊</text></svg>">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo">🥊 BOX RING</a>

            <ul class="nav-menu">
                <li><a href="./index.html">Inicio</a></li>
                <li><a href="https://github.com/mrdoob/three.js" target="_blank">Three.js</a></li>
                <li><a href="#" target="_blank">Modelo 3D</a></li>
                <li><a href="#" target="_blank">Repositorio</a></li>
            </ul>
        </div>
    </nav>

    <!-- Instrucciones -->
    <div id="info">
        <span class="info-highlight">🖱 MIRAR</span> con mouse •
        <span class="info-highlight">🚶 MOVERTE</span> con WASD •
        <span class="info-highlight">🦘 SALTAR</span> con ESPACIO

    <div id="status">🥊 RING MODE</div>

    <!-- Canvas -->
    <div id="container"></div>

    <!-- Overlay decorativo -->
    <div class="corner corner-left">RED CORNER</div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <p>© 2026 Boxing Ring • Hecho con Three.js</p>
        </div>
    </footer>

    <!-- Import map -->
    <script type="importmap">
        {
            "imports": {
                "three": "./build/three.module.js",
                "three/addons/": "./jsm/"
            }
        }
    </script>

    <script type="module" src="./main.js"></script>
